name: CI

on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test-cpu:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} (CPU)
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.version == 'nightly' }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
          - '1.11'
          - '1.12'
          - 'nightly'
        os:
          - ubuntu-latest
          - macos-14
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - uses: julia-actions/julia-buildpkg@v1

      - uses: julia-actions/julia-runtest@v1

  test-metal:
    name: Julia ${{ matrix.version }} - macOS M1 (Metal GPU)
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
          - '1.12'
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - uses: julia-actions/julia-buildpkg@v1

      - name: Check Metal GPU availability
        run: |
          julia --project -e '
            println("Arch: ", Sys.ARCH)
            println("Machine: ", Sys.MACHINE)
            using Pkg
            Pkg.add("Metal")
            using Metal
            println("Metal.jl loaded successfully")
            println("Metal functional: ", Metal.functional())
            if Metal.functional()
                println("GPU device: ", Metal.device())
            else
                println("Warning: Metal not functional on this runner")
            end
          '

      - uses: julia-actions/julia-runtest@v1
