name: CI

on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test-cpu:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} (CPU)
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.version == 'nightly' }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
          - '1.11'
          - '1.12'
          - 'nightly'
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        arch:
          - x64
        exclude:
          - os: macos-latest
            arch: x64
        include:
          - os: macos-latest
            arch: aarch64
            version: '1.10'
          - os: macos-latest
            arch: aarch64
            version: '1.11'
          - os: macos-latest
            arch: aarch64
            version: '1.12'
          - os: macos-latest
            arch: aarch64
            version: 'nightly'
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - uses: julia-actions/cache@v2

      - uses: julia-actions/julia-buildpkg@v1

      - uses: julia-actions/julia-runtest@v1

  test-metal:
    name: Julia ${{ matrix.version }} - macOS (Metal GPU)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
          - '1.12'
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: aarch64

      - uses: julia-actions/cache@v2

      - uses: julia-actions/julia-buildpkg@v1

      - name: Install Metal.jl
        run: |
          julia --project -e '
            using Pkg
            Pkg.add("Metal")
          '

      - name: Check Metal GPU availability
        run: |
          julia --project -e '
            using Metal
            println("Metal.jl loaded successfully")
            println("Metal functional: ", Metal.functional())
            if Metal.functional()
                println("GPU device: ", Metal.device())
            else
                println("Warning: Metal not functional (may be expected in CI)")
            end
          '

      - uses: julia-actions/julia-runtest@v1
